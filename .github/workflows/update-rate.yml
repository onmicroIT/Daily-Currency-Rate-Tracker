name: Daily USD to BDT Exchange Rate Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:     # Manual trigger support

jobs:
  update-rate:
    runs-on: ubuntu-latest
    
    # Prevent concurrent runs
    concurrency:
      group: daily-exchange-rate
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run exchange rate update
        id: update
        continue-on-error: false
        run: node update-rate.js

      - name: Commit and push changes
        if: steps.update.outcome == 'success'
        run: |
          git config --global user.name "onmicroIT"
          git config --global user.email "kartik@itcommunication.onmicrosoft.com"
          
          # Pull latest to avoid conflicts
          git pull origin main --rebase || true
          
          # Stage files
          git add data/history.json data/history.csv README.md 2>/dev/null || true
          
          # Check for changes and commit only if there are any
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily exchange rate"
            git push origin main
            echo "✅ Changes committed and pushed"
          else
            echo "✅ No changes to commit"
          fi
