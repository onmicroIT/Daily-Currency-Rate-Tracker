name: Daily Multi-Currency USD Exchange Rate Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-rate:
    runs-on: ubuntu-latest
    
    concurrency:
      group: daily-exchange-rate
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run exchange rate update
        id: update
        run: node update-rate.js

      - name: Commit and push changes
        if: steps.update.outcome == 'success'
        run: |
          git config --global user.name "onmicroIT"
          git config --global user.email "kartik@itcommunication.onmicrosoft.com"
          
          git pull origin main --rebase || true
          
          git add data/*.json data/*.csv README.md index.html 2>/dev/null || true
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily exchange rate"
            git push origin main
            echo "✅ Changes committed and pushed"
          else
            echo "✅ No changes to commit"
          fi